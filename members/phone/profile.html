<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Personal Profile – ZY-Invest</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --blue:#1565C0;--blue-light:#1E88E5;--blue-dark:#0D47A1;--blue-bg:#EFF6FF;
  --green:#2E7D32;--red:#DC2626;
  --fg-1:#0F172A;--fg-2:#374151;--fg-3:#64748B;
  --border:#E2E8F0;--gray-50:#F8FAFC;--gray-100:#F1F5F9;
  --font:'DM Sans',sans-serif;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;overflow:hidden;font-family:var(--font);background:var(--gray-50);color:var(--fg-1);}
a,a:hover{color:var(--blue);text-decoration:none;}

/* Shell (standalone-view only) */
.standalone-shell{display:flex;flex-direction:column;height:100%;max-width:430px;margin:0 auto;background:#fff;box-shadow:0 0 40px rgba(0,0,0,.12);}
.standalone-shell .back-bar{display:none;}
.standalone-shell .page{padding:0 0 16px;}
.page{display:block !important;}

/* Section */
.section{margin:0 16px 28px;}
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.section-label{font-size:.84rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--fg-1);}
.info-card{background:#fff;border:none;border-radius:0;overflow:hidden;}
.pf-row{padding:9px 0;}
.pf-row label{display:block;font-size:.72rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--fg-3);margin-bottom:5px;}
.pf-row input,.pf-row select{width:100%;font:inherit;font-size:.9rem;color:var(--fg-1);background:var(--gray-50);border:1.5px solid var(--border);border-radius:10px;padding:10px 12px;outline:none;transition:.2s;}
.pf-row input:focus,.pf-row select:focus{border-color:var(--blue);background:#fff;box-shadow:0 0 0 3px rgba(21,101,192,.1);}
.pf-row input:disabled{color:var(--fg-3);background:var(--gray-100);}
.pf-hint{font-size:.72rem;color:var(--fg-3);margin-top:4px;}

/* Back bar (embedded use) */
.back-bar{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 4px;}
.back-btn{background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:6px;font:inherit;font-size:.88rem;font-weight:600;color:var(--blue);padding:0;}
.back-btn svg{stroke:var(--blue);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

.bottom-pad{height:32px;}
</style>
</head>
<body>
<div class="standalone-shell">

  <!-- Topbar (standalone view only) -->
  <div style="height:52px;background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;padding:0 8px;flex-shrink:0;">
    <button onclick="history.back()" style="width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;background:none;border:none;cursor:pointer;color:var(--fg-2);">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <span style="font-size:.92rem;font-weight:700;color:var(--fg-1);">Personal Profile</span>
  </div>

  <!-- Scroll -->
  <div class="scroll" style="flex:1;overflow-y:auto;overflow-x:hidden;scrollbar-width:none;">

    <!-- PAGE DIV (extracted by page loader into index.html) -->
    <div class="page" id="pg-profiledetail">

      <!-- Back bar (embedded use only) -->
      <div class="back-bar">
        <button class="back-btn" onclick="typeof switchTab!=='undefined'?switchTab('profile'):history.back()">
          <svg width="18" height="18" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
          Back
        </button>
        <span style="font-size:.92rem;font-weight:700;color:var(--fg-1);">ZY-Invest</span>
        <div style="width:60px;"></div>
      </div>

      <!-- Page header -->
      <div style="padding:12px 20px 20px;">
        <div style="font-size:1.2rem;font-weight:700;color:var(--fg-1);margin-bottom:6px;">Update Personal Profile</div>
        <div style="font-size:.82rem;color:var(--fg-3);line-height:1.5;">Keep your details up to date. Changes are saved directly to your account.</div>
      </div>

      <!-- BASIC INFORMATION -->
      <div class="section">
        <div class="section-head"><span class="section-label">Basic Information</span></div>
        <div class="info-card">
          <div class="pf-row"><label>Full Name</label><input id="pfFullName" placeholder="As per NRIC / passport"></div>
          <div class="pf-row"><label>Preferred Name</label><input id="pfPrefName" placeholder="Display name"></div>
          <div class="pf-row"><label>IC / Passport No.</label><input id="pfNric" placeholder="e.g. 990512-14-5678">
            <div class="pf-hint" id="pfNricHint"></div>
          </div>
          <div class="pf-row"><label>Date of Birth</label><input id="pfDob" type="date"></div>
          <div class="pf-row"><label>Nationality</label>
            <select id="pfNationality">
              <option>Malaysian</option><option>Singaporean</option><option>Permanent Resident</option><option>Other</option>
            </select>
          </div>
        </div>
      </div>

      <!-- CONTACT -->
      <div class="section">
        <div class="section-head"><span class="section-label">Contact</span></div>
        <div class="info-card">
          <div class="pf-row"><label>Mobile No.</label><input id="pfPhone" placeholder="+60 1X-XXX XXXX"></div>
          <div class="pf-row"><label>Email</label><input id="pfEmail" disabled>
            <div class="pf-hint">Email is used for login and can't be changed here.</div>
          </div>
          <div class="pf-row"><label>Address</label><input id="pfAddress" placeholder="Full residential address"></div>
        </div>
      </div>

      <!-- BANK ACCOUNT -->
      <div class="section">
        <div class="section-head"><span class="section-label">Distribution Bank Account</span></div>
        <div class="info-card">
          <div class="pf-row"><label>Bank Name</label><input id="pfBankName" placeholder="e.g. Maybank"></div>
          <div class="pf-row"><label>Account No.</label><input id="pfBankAcct" placeholder="Account number"></div>
          <div class="pf-row"><label>Account Holder Name</label><input id="pfBankHolder" placeholder="Name as per bank account"></div>
        </div>
      </div>

      <div id="pfSaveErr" style="display:none;margin:0 16px 16px;font-size:.78rem;color:var(--red);"></div>
      <div class="bottom-pad"></div>
    </div><!-- /pg-profiledetail -->

  </div><!-- /scroll -->

  <!-- SAVE BUTTON -->
  <div style="padding:12px 16px calc(12px + env(safe-area-inset-bottom,0px));background:#fff;border-top:1px solid var(--border);flex-shrink:0;">
    <button id="pfSaveBtn" style="width:100%;padding:14px;border-radius:12px;border:none;background:var(--blue);color:#fff;font:inherit;font-size:.95rem;font-weight:700;cursor:pointer;" onclick="typeof saveProfileDetail!=='undefined'&&saveProfileDetail()">Save Changes</button>
  </div>

</div>
</body>
</html>
