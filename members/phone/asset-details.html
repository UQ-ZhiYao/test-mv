<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>ZY-Invest · Asset Details</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --blue:#1565C0;--blue-light:#1E88E5;--blue-dark:#0D47A1;--blue-bg:#EFF6FF;
  --green:#2E7D32;--green-bg:#F0FDF4;
  --red:#DC2626;--red-bg:#FEF2F2;
  --orange:#B45309;--orange-bg:#FFF7ED;
  --fg-1:#0F172A;--fg-2:#374151;--fg-3:#64748B;
  --border:#E2E8F0;--gray-50:#F8FAFC;--gray-100:#F1F5F9;
  --font-body:'DM Sans',sans-serif;--font-display:'DM Serif Display',serif;
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;overflow:hidden;font-family:var(--font-body);background:var(--gray-50);color:var(--fg-1);}

.app{display:flex;flex-direction:column;height:100%;max-width:430px;margin:0 auto;background:#fff;position:relative;}
.standalone-shell{display:flex;flex-direction:column;height:100%;max-width:430px;margin:0 auto;background:#fff;box-shadow:0 0 40px rgba(0,0,0,.12);}
.standalone-shell .back-bar{display:none;}
.page{display:block !important;padding:0 0 16px;}

.scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;scrollbar-width:none;}
.scroll::-webkit-scrollbar{display:none;}

.back-bar{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 4px;}
.back-btn{background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:6px;font:inherit;font-size:.88rem;font-weight:600;color:var(--blue);padding:0;}
.back-btn svg{stroke:var(--blue);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

/* Asset Details page */
.ad-donut-wrap{display:flex;flex-direction:column;align-items:center;padding:8px 0 4px;}
.ad-donut-total-l{font-size:.68rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--fg-3);}
.ad-donut-total-v{font-size:1.5rem;font-weight:700;color:var(--fg-1);letter-spacing:-.02em;}
.ad-legend{display:flex;justify-content:center;gap:22px;margin-top:14px;}
.ad-legend-item{display:flex;align-items:center;gap:7px;}
.ad-legend-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.ad-legend-label{font-size:.78rem;color:var(--fg-2);}
.ad-legend-value{font-size:.78rem;font-weight:700;color:var(--fg-1);}
.ad-seg{display:flex;gap:2px;background:var(--gray-100);border-radius:8px;padding:3px;}
.ad-seg button{font:inherit;font-size:.72rem;font-weight:600;padding:4px 8px;border:none;background:none;border-radius:6px;color:var(--fg-3);cursor:pointer;}
.ad-seg button.on{background:#fff;color:var(--blue);box-shadow:0 1px 4px rgba(0,0,0,.1);}
.ad-trend-lbls{display:flex;justify-content:space-between;margin-top:4px;font-size:.68rem;color:var(--fg-3);}
</style>
</head>
<body>
<div class="standalone-shell">

  <!-- Topbar (standalone only) -->
  <div style="height:52px;background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 8px;flex-shrink:0;">
    <button onclick="history.back()" style="width:40px;height:40px;display:flex;align-items:center;justify-content:center;background:none;border:none;cursor:pointer;color:var(--fg-2);">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <span style="font-size:.92rem;font-weight:700;color:var(--fg-1);">Asset Details</span>
    <div style="width:40px;"></div>
  </div>

  <div class="scroll">
<div class="page" id="pg-assetdetails">

      <!-- Back bar (embedded use only) -->
      <div class="back-bar">
        <button class="back-btn" onclick="typeof switchTab!=='undefined'?switchTab('portfolio'):history.back()">
          <svg width="18" height="18" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
          Back
        </button>
        <span style="font-size:.92rem;font-weight:700;color:var(--fg-1);">Asset Details</span>
        <div style="width:60px;"></div>
      </div>

      <!-- Total Asset Value -->
      <div style="padding:16px 16px 0;">
        <div style="font-size:.85rem;font-weight:700;color:var(--fg-1);margin-bottom:12px;">Total Asset Value</div>
        <div class="ad-donut-wrap">
          <div style="position:relative;">
            <canvas id="adDonut" style="display:block;"></canvas>
            <div id="adDonutText" style="position:absolute;left:0;right:0;text-align:center;">
              <div class="ad-donut-total-l">Total · MYR</div>
              <div class="ad-donut-total-v" id="adDonutTotal">0.00</div>
            </div>
          </div>
          <div class="ad-legend">
            <div class="ad-legend-item" id="adLegendPersonalWrap">
              <span class="ad-legend-dot" style="background:#64B5F6;"></span>
              <span class="ad-legend-label">Personal</span>
              <span class="ad-legend-value" id="adLegendPersonal">0.0%</span>
            </div>
            <div class="ad-legend-item" id="adLegendJointWrap">
              <span class="ad-legend-dot" style="background:#B39DDB;"></span>
              <span class="ad-legend-label">Joint</span>
              <span class="ad-legend-value" id="adLegendJoint">0.0%</span>
            </div>
          </div>
        </div>
      </div>

      <div style="border-top:1px solid var(--border);margin:32px 16px 0;"></div>

      <!-- Asset Trends -->
      <div style="padding:16px 16px 0;">
        <div style="height:1em;"></div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
          <div style="font-size:.85rem;font-weight:700;color:var(--fg-1);">Asset Trends</div>
          <div class="ad-seg" id="adSeg">
            <button class="on" onclick="switchAdPeriod('ytd',this)">YTD</button>
            <button onclick="switchAdPeriod('1m',this)">1M</button>
            <button onclick="switchAdPeriod('3m',this)">3M</button>
            <button onclick="switchAdPeriod('1y',this)">1Y</button>
            <button onclick="switchAdPeriod('all',this)">ALL</button>
          </div>
        </div>
        <canvas id="adTrendChart" style="width:100%;height:150px;display:block;"></canvas>
        <div class="ad-trend-lbls">
          <span id="adTrendL0"></span>
          <span id="adTrendL1"></span>
          <span id="adTrendL2"></span>
        </div>
        <div style="height:16px;"></div>
      </div>

    </div>  </div>
</div>
<script>
// Standalone fallback: this page only self-renders when opened directly (not embedded).
// When embedded, index.html's page loader strips this <script> tag entirely, and
// the shared logic in index.html's main script take over.
if(typeof switchTab==='undefined'){
function drawAdDonut(){
  var c=document.getElementById('adDonut');
  var dpr=window.devicePixelRatio||1;
  var W=c.parentElement.parentElement.clientWidth-32;
  var size=Math.min(W,260);
  var H=size*0.58;
  c.width=size*dpr;c.height=H*dpr;
  c.style.width=size+'px';c.style.height=H+'px';
  var ctx=c.getContext('2d');ctx.scale(dpr,dpr);
  var cx=size/2,cy=H*0.96,r=size*0.42,lw=r*0.11;
  var segs=[{v:65.9,c:'#64B5F6'},{v:34.1,c:'#B39DDB'}];
  var start=Math.PI;
  ctx.lineCap='butt';
  segs.forEach(function(s){
    var ang=(s.v/100)*Math.PI;
    ctx.beginPath();
    ctx.arc(cx,cy,r,start,start+ang);
    ctx.lineWidth=lw;ctx.strokeStyle=s.c;ctx.stroke();
    start+=ang;
  });
  var txt=document.getElementById('adDonutText');
  if(txt){txt.style.top=(cy-6)+'px';txt.style.transform='translateY(-100%)';}
}
var AD_TREND={
  ytd:{v:[76200,78100,79850,81200,83400,85100,86300,88000],l:['Jan','Mar','May','Jul']},
  '1m':{v:[85200,85900,86400,85800,86900,87500,87200,88000],l:['Wk1','Wk2','Wk3','Wk4']},
  '3m':{v:[80800,82100,83400,84900,86000,87100,87600,88000],l:['May','Jun','Jul']},
  '1y':{v:[68200,71400,73900,76200,79850,83400,86300,88000],l:["Jul '25",'Jan',"Jul '26"]},
  all:{v:[42000,51200,58900,66700,73900,79850,84900,88000],l:['2022','2024','2026']}
};
var adPeriod='ytd';
function drawAdTrend(period){
  var canvas=document.getElementById('adTrendChart');
  var ctx=canvas.getContext('2d');
  var data=AD_TREND[period];
  var dpr=window.devicePixelRatio||1;
  var W=canvas.parentElement.clientWidth-32,H=150;
  canvas.width=W*dpr;canvas.height=H*dpr;
  canvas.style.width=W+'px';canvas.style.height=H+'px';
  ctx.scale(dpr,dpr);
  var vals=data.v,n=vals.length;
  var mn=Math.min.apply(null,vals),mx=Math.max.apply(null,vals),rng=(mx-mn)||1;
  var padX=4,padY=10;
  function px(i){return padX+(i/(n-1))*(W-padX*2);}
  function py(v){return H-padY-((v-mn)/rng)*(H-padY*2);}
  var grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'rgba(21,101,192,.18)');
  grad.addColorStop(1,'rgba(21,101,192,0)');
  ctx.beginPath();
  ctx.moveTo(px(0),py(vals[0]));
  for(var i=1;i<n;i++) ctx.lineTo(px(i),py(vals[i]));
  ctx.lineTo(px(n-1),H-padY);ctx.lineTo(px(0),H-padY);ctx.closePath();
  ctx.fillStyle=grad;ctx.fill();
  ctx.beginPath();ctx.strokeStyle='#1565C0';ctx.lineWidth=2;ctx.lineJoin='round';ctx.lineCap='round';
  ctx.moveTo(px(0),py(vals[0]));
  for(var i=1;i<n;i++) ctx.lineTo(px(i),py(vals[i]));
  ctx.stroke();
  ctx.beginPath();ctx.arc(px(n-1),py(vals[n-1]),3.5,0,Math.PI*2);
  ctx.fillStyle='#fff';ctx.fill();ctx.strokeStyle='#1565C0';ctx.lineWidth=2;ctx.stroke();
  var lbls=data.l;
  document.getElementById('adTrendL0').textContent=lbls[0]||'';
  document.getElementById('adTrendL1').textContent=lbls[Math.floor(lbls.length/2)]||'';
  document.getElementById('adTrendL2').textContent=lbls[lbls.length-1]||'';
}
window.switchAdPeriod=function(p,btn){
  adPeriod=p;
  document.querySelectorAll('#adSeg button').forEach(function(b){b.classList.remove('on');});
  btn.classList.add('on');
  drawAdTrend(p);
};
drawAdDonut();drawAdTrend('ytd');
window.addEventListener('resize',function(){drawAdDonut();drawAdTrend(adPeriod);});
}
</script>
</body>
</html>
