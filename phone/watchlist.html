<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>ZY-Invest · Watchlist</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/phone-shared.css?v=5">
</head>
<body>
<div class="standalone-shell">
  <div class="scroll" style="flex:1;overflow-y:auto;overflow-x:hidden;scrollbar-width:none;">
<div class="page" id="pg-watchlist">

      <div style="padding:14px 16px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);">
        <div style="font-size:1.1rem;font-weight:700;color:var(--fg-1);">Watchlist</div>
        <div id="wlTime" style="font-size:.7rem;color:var(--fg-3);">—</div>
      </div>

      <!-- Empty state renders in place of the rows when there's nothing
           saved yet — Add Instrument (below) still works either way. -->
      <div id="wlEmpty" style="display:none;padding:32px 20px;text-align:center;">
        <div style="font-size:.85rem;font-weight:700;color:var(--fg-1);margin-bottom:6px;">Your watchlist is empty</div>
        <div style="font-size:.78rem;color:var(--fg-3);line-height:1.5;">Tap "Add Instrument" below to start tracking stocks and other securities.</div>
      </div>

      <!-- Full-width rows, no card — same flat list treatment as the
           Market screen (mktRenderRow() in market-data.js).
           renderWatchlist()/drawWatchlistList() in watchlist-actions.js.
           Tapping a row opens the shared Instrument Detail page
           (search-instruments.js); "Edit List" below swaps each row's
           trailing space for a remove button instead. -->
      <div id="wlList"></div>

      <!-- Add Instrument + Edit List, one line, each with a leading
           icon — per spec. -->
      <div style="display:flex;align-items:center;justify-content:center;gap:24px;padding:13px 16px;border-top:1px solid var(--border);">
        <div id="wlAddInstrumentBtn" onclick="openWlSearch()" style="display:flex;align-items:center;gap:8px;cursor:pointer;color:var(--blue);">
          <svg width="18" height="18" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
          <span style="font-size:.82rem;font-weight:600;">Add Instrument</span>
        </div>
        <div id="wlEditListItem" onclick="toggleWlEditMode()" style="display:flex;align-items:center;gap:8px;cursor:pointer;color:var(--fg-2);opacity:.4;">
          <svg width="18" height="18" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          <span id="wlEditLabel" style="font-size:.82rem;font-weight:600;">Edit List</span>
        </div>
      </div>

    </div>  </div>
</div>
</body>
</html>
