<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Edit Profile – ZY-Invest</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --blue:#1565C0;--blue-bg:#EFF6FF;--red:#DC2626;
  --fg-1:#0F172A;--fg-2:#374151;--fg-3:#64748B;
  --border:#E2E8F0;--gray-50:#F8FAFC;--gray-100:#F1F5F9;
  --font:'DM Sans',sans-serif;
}
html,body{height:100%;overflow:hidden;font-family:var(--font);background:var(--gray-50);color:var(--fg-1);
  touch-action:pan-y;overscroll-behavior:none;
  -webkit-user-select:none;user-select:none;-webkit-touch-callout:none;
}
input,textarea,select{-webkit-user-select:text;user-select:text;}
.app{display:flex;flex-direction:column;height:100%;max-width:430px;margin:0 auto;background:#fff;box-shadow:0 0 40px rgba(0,0,0,.12);}

.topbar{height:52px;background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;padding:0 8px;flex-shrink:0;}
.tb-btn{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;background:none;border:none;cursor:pointer;color:var(--fg-2);}
.tb-btn svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.tb-title{font-size:.92rem;font-weight:700;color:var(--fg-1);}

.scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;scrollbar-width:none;}
.scroll::-webkit-scrollbar{display:none;}

.page-header{padding:24px 20px 20px;}
.page-title{font-size:1.2rem;font-weight:700;color:var(--fg-1);margin-bottom:6px;}
.page-sub{font-size:.82rem;color:var(--fg-3);line-height:1.5;}

/* Field boxes — each box covers one field's title + its input */
.field-box{margin:0 16px 12px;background:var(--gray-50);border:1.5px solid var(--border);border-radius:14px;padding:12px 14px;}
.field-box label{display:block;font-size:.72rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--fg-3);margin-bottom:6px;}
.field-box input,.field-box select{width:100%;font:inherit;font-size:.92rem;font-weight:600;color:var(--fg-1);background:none;border:none;outline:none;padding:0;}
.field-box.disabled{background:var(--gray-100);}
.field-box.disabled input{color:var(--fg-3);}
.field-box .hint{font-size:.7rem;color:var(--fg-3);margin-top:4px;font-weight:400;text-transform:none;letter-spacing:0;}

.bottom-pad{height:24px;}
</style>
</head>
<body>
<div class="app">

  <div class="topbar">
    <button class="tb-btn" onclick="history.back()">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <span class="tb-title" id="editTitle">Edit</span>
  </div>

  <div class="scroll">
    <div class="page-header">
      <div class="page-title" id="editHeading">Edit</div>
      <div class="page-sub" id="editSub">Update your details below, then tap Save.</div>
    </div>

    <div id="fieldsWrap"></div>

    <div id="pfeErr" style="display:none;margin:0 16px 8px;font-size:.78rem;color:var(--red);"></div>
    <div class="bottom-pad"></div>
  </div>

  <div style="padding:12px 16px calc(12px + env(safe-area-inset-bottom,0px));background:#fff;border-top:1px solid var(--border);flex-shrink:0;">
    <button id="pfeSaveBtn" style="width:100%;padding:14px;border-radius:12px;border:none;background:var(--blue);color:#fff;font:inherit;font-size:.95rem;font-weight:700;cursor:pointer;" onclick="savePfeSection()" data-i18n="profileedit.save">Save</button>
  </div>

</div>

<div id="pfeToast" style="position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(10px);background:#0F172A;color:#fff;font-size:.82rem;font-weight:600;padding:10px 20px;border-radius:99px;opacity:0;transition:.25s;pointer-events:none;white-space:nowrap;z-index:102;"></div>

<script src="../assets/js/i18n.js?v=17"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/js/supabase-auth.js"></script>
<script src="../assets/js/member-api.js?v=7"></script>
<script>
// Tell index.html's App Lock (assets/js/phone/profile-account.js) that
// whenever the app is next reached again, it got here via a real round
// trip through this in-app subpage — not a genuine close/backgrounding —
// so it shouldn't demand the whole-app PIN again on the way back.
try{ sessionStorage.setItem('zy_returning_from_subpage','1'); }catch(e){}

var PFE_USER=null, PFE_PROFILE=null;

// Field definitions per section — each becomes one "box" (label + input).
// label/sub/placeholder/hint/option values below are i18n.js dictionary
// keys, not literal English — resolved via tt() in renderFields(). Select
// option *values* stay the literal English words (they're what gets saved
// to the DB); only their displayed text translates.
var PFE_SECTIONS={
  basic:{
    title:'profile.basicInfo',
    sub:'profileedit.basicSub',
    fields:[
      {field:'full_name',label:'profile.fullName',type:'text',placeholder:'profileedit.fullNamePlaceholder'},
      {field:'nric_passport',label:'profile.icPassport',type:'text',placeholder:'profileedit.icPassportPlaceholder'},
      {field:'date_of_birth',label:'profile.dob',type:'date'},
      {field:'gender',label:'profile.gender',type:'select',options:[['Male','profileedit.male'],['Female','profileedit.female']]},
      {field:'nationality',label:'profile.nationality',type:'select',options:[['Malaysian','profileedit.malaysian'],['Singaporean','profileedit.singaporean'],['Permanent Resident','profileedit.permanentResident'],['Other','profileedit.other']]}
    ]
  },
  contact:{
    title:'profile.contact',
    sub:'profileedit.contactSub',
    fields:[
      {field:'phone',label:'profile.mobileNo',type:'text',placeholder:'profileedit.mobilePlaceholder'},
      {field:'email',label:'profile.email',type:'text',disabled:true,hint:'profileedit.emailHint'},
      {field:'address',label:'profile.address',type:'text',placeholder:'profileedit.addressPlaceholder'},
      {field:'postcode',label:'profile.postcode',type:'text'},
      {field:'city',label:'profile.city',type:'text'},
      {field:'state',label:'profile.state',type:'text'}
    ]
  },
  bank:{
    title:'profile.bankAccount',
    sub:'profileedit.bankSub',
    fields:[
      {field:'bank_name',label:'profile.bankName',type:'text',placeholder:'profileedit.bankNamePlaceholder'},
      {field:'bank_account_no',label:'profile.accountNo',type:'text',placeholder:'profileedit.accountNoPlaceholder'},
      {field:'bank_account_holder',label:'profileedit.accountHolderName',type:'text',placeholder:'profileedit.accountHolderPlaceholder'}
    ]
  }
};

function pfeToast(msg){
  var el=document.getElementById('pfeToast');
  if(!el) return;
  el.textContent=msg; el.style.opacity='1'; el.style.transform='translateX(-50%) translateY(0)';
  clearTimeout(window._pfeToastT);
  window._pfeToastT=setTimeout(function(){el.style.opacity='0';el.style.transform='translateX(-50%) translateY(10px)';},2400);
}

function getSectionKey(){
  var qs=new URLSearchParams(window.location.search);
  var s=qs.get('section');
  return PFE_SECTIONS[s]?s:'basic';
}

function renderFields(sectionKey,values){
  var tt=(typeof t==='function')?t:function(k){return k;};
  var section=PFE_SECTIONS[sectionKey];
  var title=tt(section.title);
  document.getElementById('editTitle').textContent=title;
  document.getElementById('editHeading').textContent=tt('profileedit.editPrefix')+title;
  document.getElementById('editSub').textContent=tt(section.sub);
  var wrap=document.getElementById('fieldsWrap');
  wrap.innerHTML=section.fields.map(function(f){
    var val=values[f.field];
    var disabled=f.disabled?' disabled':'';
    var boxClass='field-box'+(f.disabled?' disabled':'');
    var inputHtml;
    if(f.type==='select'){
      inputHtml='<select id="pfe_'+f.field+'"'+disabled+'>'+f.options.map(function(o){
        return '<option value="'+o[0]+'"'+(val===o[0]?' selected':'')+'>'+tt(o[1])+'</option>';
      }).join('')+'</select>';
    } else {
      inputHtml='<input id="pfe_'+f.field+'" type="'+(f.type==='date'?'date':'text')+'" value="'+(val&&val!=='-'?String(val).replace(/"/g,'&quot;'):'')+'" placeholder="'+(f.placeholder?tt(f.placeholder):'')+'"'+disabled+'>';
    }
    return '<div class="'+boxClass+'"><label>'+tt(f.label)+'</label>'+inputHtml
      +(f.hint?'<div class="hint">'+tt(f.hint)+'</div>':'')+'</div>';
  }).join('');
}

async function loadPfe(){
  try{
    if(typeof sb==='undefined'||!sb) throw new Error('Not configured');
    var sess=await sb.auth.getSession();
    PFE_USER=sess.data&&sess.data.session&&sess.data.session.user;
    if(!PFE_USER){ window.location.href='login.html'; return; }
    PFE_PROFILE=await mpLoadProfile(PFE_USER.id);
    var P=PFE_PROFILE||{};
    var values=Object.assign({},P,{email:PFE_USER.email});
    renderFields(getSectionKey(),values);
  }catch(e){
    console.warn('Edit profile load failed:',e.message);
    renderFields(getSectionKey(),{});
  }
}

async function savePfeSection(){
  var sectionKey=getSectionKey();
  var section=PFE_SECTIONS[sectionKey];
  var tt=(typeof t==='function')?t:function(k){return k;};
  var btn=document.getElementById('pfeSaveBtn'), errEl=document.getElementById('pfeErr');
  errEl.style.display='none';
  if(!PFE_USER){ errEl.textContent=tt('profileedit.notSignedIn'); errEl.style.display='block'; return; }
  var updates={};
  section.fields.forEach(function(f){
    if(f.disabled) return; // e.g. email — not editable here, not sent
    var el=document.getElementById('pfe_'+f.field);
    if(!el) return;
    var v=el.value.trim();
    updates[f.field]=v===''?null:v;
  });
  var orig=btn.textContent;
  btn.disabled=true; btn.textContent=tt('profileedit.saving');
  try{
    await mpSaveProfile(PFE_USER.id, updates);
    pfeToast(tt('profileedit.savedSuccessfully'));
    setTimeout(function(){ window.location.replace('profile.html'); },600);
  }catch(e){
    errEl.textContent=tt('profileedit.saveFailed')+(e&&e.message||'Unknown error — some fields may not be supported by the database yet.');
    errEl.style.display='block';
    btn.disabled=false; btn.textContent=orig;
  }
}

loadPfe();
</script>
</body>
</html>
