<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>ZY-Invest · App Feedback</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/phone-shared.css?v=5">
</head>
<body>
<div class="standalone-shell">
  <div class="scroll" style="flex:1;overflow-y:auto;overflow-x:hidden;scrollbar-width:none;">
<div class="page" id="pg-feedback">

      <!-- Back bar (standalone fallback only — embedded use gets its back
           button from the shared topbar via DRILL_PAGES in
           profile-account.js). -->
      <div class="back-bar">
        <button class="back-btn" onclick="typeof switchTab!=='undefined'?switchTab('profile'):history.back()">
          <svg width="18" height="18" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
          Back
        </button>
        <span style="font-size:.92rem;font-weight:700;color:var(--fg-1);">ZY-Invest</span>
        <div style="width:60px;"></div>
      </div>

      <div style="padding:12px 20px 4px;">
        <div style="font-size:1.2rem;font-weight:700;color:var(--fg-1);margin-bottom:6px;" data-i18n="feedback.pageTitle">App Feedback</div>
        <div style="font-size:.82rem;color:var(--fg-3);line-height:1.5;" data-i18n="feedback.pageSub">Tell us what's working, what isn't, or what you'd like to see — it's sent straight to our support team.</div>
      </div>

      <div style="padding:20px 16px 0;">
        <div style="font-size:.72rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--fg-3);margin-bottom:10px;" data-i18n="feedback.subject">Subject</div>
        <select id="feedbackSubjectSelect" class="fb-subject-select" required onchange="clearFeedbackSubjectErr()">
          <option value="" disabled selected hidden data-i18n="feedback.selectSubject">Select a subject</option>
          <option value="Security &amp; Password" data-i18n="feedback.subjSecurity">Security &amp; Password</option>
          <option value="UI/UX Design" data-i18n="feedback.subjUiUx">UI/UX Design</option>
          <option value="Others" data-i18n="feedback.subjOthers">Others</option>
        </select>
        <div id="feedbackSubjectErr" style="display:none;color:var(--red);font-size:.76rem;margin-top:8px;" data-i18n="feedback.subjectErr">Please select a subject.</div>
      </div>

      <div style="padding:20px 16px 0;">
        <div style="font-size:.72rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--fg-3);margin-bottom:10px;" data-i18n="feedback.yourMessage">Your Message</div>
        <textarea id="feedbackContent" rows="6" placeholder="Write your feedback here…" data-i18n-placeholder="feedback.messagePlaceholder" style="width:100%;font:inherit;font-size:.86rem;color:var(--fg-1);background:#fff;border:1.5px solid var(--border);border-radius:12px;padding:13px 14px;resize:vertical;outline:none;box-sizing:border-box;"></textarea>
        <div id="feedbackContentErr" style="display:none;color:var(--red);font-size:.76rem;margin-top:8px;" data-i18n="feedback.contentErr">Please write your feedback before submitting.</div>
      </div>

      <div style="height:24px;"></div>

    </div>  </div>
</div>
</body>
</html>
