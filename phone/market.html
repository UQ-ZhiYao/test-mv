<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>ZY-Invest · Market</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/phone-shared.css">
</head>
<body>
<div class="standalone-shell">
  <div class="scroll" style="flex:1;overflow-y:auto;overflow-x:hidden;scrollbar-width:none;">
<div class="page" id="pg-market">

      <!-- ── MARKET TABS ── -->
      <div style="display:flex;gap:0;padding:0 16px;border-bottom:1px solid var(--border);position:sticky;top:0;background:#fff;z-index:10;overflow-x:auto;scrollbar-width:none;">
        <button id="mtab-indices-btn" onclick="switchMarketTab('indices')" style="font:inherit;font-size:.82rem;font-weight:600;color:var(--blue);background:none;border:none;border-bottom:2px solid var(--blue);padding:12px 12px 10px;cursor:pointer;white-space:nowrap;flex-shrink:0;">Indices</button>
        <button id="mtab-forex-btn" onclick="switchMarketTab('forex')" style="font:inherit;font-size:.82rem;font-weight:600;color:var(--fg-3);background:none;border:none;border-bottom:2px solid transparent;padding:12px 12px 10px;cursor:pointer;white-space:nowrap;flex-shrink:0;">Forex</button>
        <button id="mtab-crypto-btn" onclick="switchMarketTab('crypto')" style="font:inherit;font-size:.82rem;font-weight:600;color:var(--fg-3);background:none;border:none;border-bottom:2px solid transparent;padding:12px 12px 10px;cursor:pointer;white-space:nowrap;flex-shrink:0;">Crypto</button>
      </div>

      <!-- ── INDICES ── -->
      <div id="mtab-indices-body" style="display:block;padding:0 0 32px;">
        <div style="padding:16px 16px 0;">
          <div style="height:1em;"></div>
          <div style="font-size:.72rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--fg-3);margin-bottom:6px;">Headline</div>
        </div>
        <div id="mktIndicesHeadline" style="border-top:1px solid var(--border);">
          <div style="padding:16px;text-align:center;color:var(--fg-3);font-size:.72rem;">Loading…</div>
        </div>

        <div style="padding:20px 16px 0;">
          <div style="font-size:.72rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--fg-3);margin-bottom:6px;">Top</div>
        </div>
        <div id="mktIndices-top" style="border-top:1px solid var(--border);"></div>

        <div style="padding:20px 16px 0;">
          <div style="font-size:.72rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--fg-3);margin-bottom:6px;">American</div>
        </div>
        <div id="mktIndices-american" style="border-top:1px solid var(--border);"></div>

        <div style="padding:20px 16px 0;">
          <div style="font-size:.72rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--fg-3);margin-bottom:6px;">Asia</div>
        </div>
        <div id="mktIndices-asia" style="border-top:1px solid var(--border);"></div>

        <div style="padding:20px 16px 0;">
          <div style="font-size:.72rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--fg-3);margin-bottom:6px;">European</div>
        </div>
        <div id="mktIndices-european" style="border-top:1px solid var(--border);"></div>
      </div>

      <!-- ── FOREX ── -->
      <div id="mtab-forex-body" style="display:none;padding:0 0 32px;">
        <div style="padding:16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);">
          <div style="font-size:.78rem;font-weight:600;color:var(--fg-2);">Base Currency</div>
          <select id="mktFxBaseSelect" class="tx-acct-select" onchange="changeFxBase(this.value)">
            <option value="MYR">MYR — Malaysian Ringgit</option>
            <option value="USD">USD — US Dollar</option>
            <option value="SGD">SGD — Singapore Dollar</option>
            <option value="EUR">EUR — Euro</option>
            <option value="GBP">GBP — British Pound</option>
            <option value="JPY">JPY — Japanese Yen</option>
            <option value="CNY">CNY — Chinese Yuan</option>
            <option value="AUD">AUD — Australian Dollar</option>
            <option value="HKD">HKD — Hong Kong Dollar</option>
            <option value="THB">THB — Thai Baht</option>
          </select>
        </div>
        <div id="mktForexList">
          <div style="padding:16px;text-align:center;color:var(--fg-3);font-size:.72rem;">Loading…</div>
        </div>
      </div>

      <!-- ── CRYPTO ── -->
      <div id="mtab-crypto-body" style="display:none;padding:0 0 32px;">
        <div id="mktCryptoList" style="border-top:1px solid var(--border);">
          <div style="padding:16px;text-align:center;color:var(--fg-3);font-size:.72rem;">Loading…</div>
        </div>
      </div>

    </div>  </div>
</div>
</body>
</html>
