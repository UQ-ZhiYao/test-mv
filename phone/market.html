<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>ZY-Invest · Market</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/phone-shared.css">
</head>
<body>
<div class="standalone-shell">
  <div class="scroll" style="flex:1;overflow-y:auto;overflow-x:hidden;scrollbar-width:none;">
<div class="page" id="pg-market">
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;padding:32px 24px;text-align:center;">
        <div style="width:72px;height:72px;border-radius:20px;background:var(--orange-bg);display:flex;align-items:center;justify-content:center;margin-bottom:20px;">
          <svg width="32" height="32" viewBox="0 0 24 24" stroke="var(--orange)" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
        </div>
        <div style="font-family:'DM Serif Display',serif;font-style:italic;font-size:1.5rem;color:var(--fg-1);margin-bottom:10px;">Coming Soon</div>
        <div style="font-size:.88rem;color:var(--fg-3);line-height:1.7;max-width:260px;">Live market data, global indices, price charts and sector performance — launching soon.</div>
        <div style="margin-top:28px;padding:14px 20px;background:var(--orange-bg);border-radius:12px;text-align:left;max-width:300px;width:100%;">
          <div style="font-size:.72rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--orange);margin-bottom:10px;">What's coming</div>
          <div style="display:flex;flex-direction:column;gap:9px;">
            <div style="display:flex;align-items:center;gap:10px;font-size:.82rem;color:var(--fg-2)"><span style="width:6px;height:6px;border-radius:50%;background:var(--orange);flex-shrink:0"></span>Live Bursa &amp; global indices</div>
            <div style="display:flex;align-items:center;gap:10px;font-size:.82rem;color:var(--fg-2)"><span style="width:6px;height:6px;border-radius:50%;background:var(--orange);flex-shrink:0"></span>Real-time price charts</div>
            <div style="display:flex;align-items:center;gap:10px;font-size:.82rem;color:var(--fg-2)"><span style="width:6px;height:6px;border-radius:50%;background:var(--orange);flex-shrink:0"></span>Sector &amp; commodity performance</div>
            <div style="display:flex;align-items:center;gap:10px;font-size:.82rem;color:var(--fg-2)"><span style="width:6px;height:6px;border-radius:50%;background:var(--orange);flex-shrink:0"></span>Currency &amp; forex rates</div>
          </div>
        </div>
      </div>
    </div>  </div>
</div>
</body>
</html>
