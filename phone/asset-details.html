<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>ZY-Invest · Asset Details</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --blue:#1565C0;--blue-light:#1E88E5;--blue-dark:#0D47A1;--blue-bg:#EFF6FF;
  --green:#2E7D32;--green-bg:#F0FDF4;
  --red:#DC2626;--red-bg:#FEF2F2;
  --orange:#B45309;--orange-bg:#FFF7ED;
  --fg-1:#0F172A;--fg-2:#374151;--fg-3:#64748B;
  --border:#E2E8F0;--gray-50:#F8FAFC;--gray-100:#F1F5F9;
  --font-body:'DM Sans',sans-serif;--font-display:'DM Serif Display',serif;
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;overflow:hidden;font-family:var(--font-body);background:var(--gray-50);color:var(--fg-1);}

.app{display:flex;flex-direction:column;height:100%;max-width:430px;margin:0 auto;background:#fff;position:relative;}
.standalone-shell{display:flex;flex-direction:column;height:100%;max-width:430px;margin:0 auto;background:#fff;box-shadow:0 0 40px rgba(0,0,0,.12);}
.standalone-shell .back-bar{display:none;}
.page{display:block !important;padding:0 0 16px;}

.scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;scrollbar-width:none;}
.scroll::-webkit-scrollbar{display:none;}

.back-bar{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 4px;}
.back-btn{background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:6px;font:inherit;font-size:.88rem;font-weight:600;color:var(--blue);padding:0;}
.back-btn svg{stroke:var(--blue);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

/* Asset Details page */
.ad-donut-wrap{display:flex;flex-direction:column;align-items:center;padding:8px 0 4px;}
.ad-donut-total-l{font-size:.68rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--fg-3);}
.ad-donut-total-v{font-size:1.5rem;font-weight:700;color:var(--fg-1);letter-spacing:-.02em;}
.ad-legend{display:flex;justify-content:center;gap:22px;margin-top:14px;}
.ad-legend-item{display:flex;align-items:center;gap:7px;}
.ad-legend-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.ad-legend-label{font-size:.78rem;color:var(--fg-2);}
.ad-legend-value{font-size:.78rem;font-weight:700;color:var(--fg-1);}
.ad-seg{display:flex;gap:2px;background:var(--gray-100);border-radius:8px;padding:3px;}
.ad-seg button{font:inherit;font-size:.72rem;font-weight:600;padding:4px 8px;border:none;background:none;border-radius:6px;color:var(--fg-3);cursor:pointer;}
.ad-seg button.on{background:#fff;color:var(--blue);box-shadow:0 1px 4px rgba(0,0,0,.1);}
.ad-trend-lbls{display:flex;justify-content:space-between;margin-top:4px;font-size:.68rem;color:var(--fg-3);}
.ad-trend-hover{min-height:78px;margin-bottom:8px;}
.ad-trend-hover-date{font-size:.66rem;color:var(--fg-3);font-weight:600;line-height:1.3;margin-bottom:3px;}
.ad-trend-hover-row{display:flex;justify-content:space-between;align-items:center;font-size:.76rem;line-height:1.7;}
.ad-trend-hover-row .lbl{color:var(--fg-3);}
.ad-trend-hover-row .val{color:var(--fg-1);font-weight:700;}
.ad-trend-hover-row .val.pnl-pos{color:var(--green);}
.ad-trend-hover-row .val.pnl-neg{color:var(--red);}
.ad-trend-legend{display:flex;justify-content:center;gap:14px;margin-top:10px;}
.ad-trend-legend-item{display:flex;align-items:center;gap:5px;font-size:.68rem;color:var(--fg-3);}
.ad-trend-legend-sw{width:12px;height:0;flex-shrink:0;}
</style>
</head>
<body>
<div class="standalone-shell">

  <!-- Topbar (standalone only) -->
  <div style="height:52px;background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 8px;flex-shrink:0;">
    <button onclick="history.back()" style="width:40px;height:40px;display:flex;align-items:center;justify-content:center;background:none;border:none;cursor:pointer;color:var(--fg-2);">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <span style="font-size:.92rem;font-weight:700;color:var(--fg-1);" data-i18n="portfolio.assetDetailsTitle">Asset Details</span>
    <div style="width:40px;"></div>
  </div>

  <div class="scroll">
<div class="page" id="pg-assetdetails">

      <!-- Back bar (embedded use only) -->
      <div class="back-bar">
        <button class="back-btn" onclick="typeof switchTab!=='undefined'?switchTab('portfolio'):history.back()">
          <svg width="18" height="18" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
          <span data-i18n="market.back">Back</span>
        </button>
        <span style="font-size:.92rem;font-weight:700;color:var(--fg-1);" data-i18n="portfolio.assetDetailsTitle">Asset Details</span>
        <div style="width:60px;"></div>
      </div>

      <!-- Total Asset Value -->
      <div style="padding:16px 16px 0;">
        <div style="font-size:.85rem;font-weight:700;color:var(--fg-1);margin-bottom:12px;" data-i18n="assetdetails.totalAssetValue">Total Asset Value</div>
        <div class="ad-donut-wrap">
          <div style="position:relative;">
            <canvas id="adDonut" style="display:block;"></canvas>
            <div id="adDonutText" style="position:absolute;left:0;right:0;text-align:center;">
              <div class="ad-donut-total-l" data-i18n="assetdetails.totalMyr">Total · MYR</div>
              <div class="ad-donut-total-v" id="adDonutTotal">0.00</div>
            </div>
          </div>
          <div class="ad-legend">
            <div class="ad-legend-item" id="adLegendPersonalWrap">
              <span class="ad-legend-dot" style="background:#64B5F6;"></span>
              <span class="ad-legend-label" data-i18n="assetdetails.personal">Personal</span>
              <span class="ad-legend-value" id="adLegendPersonal">0.0%</span>
            </div>
            <div class="ad-legend-item" id="adLegendJointWrap" style="display:none;">
              <span class="ad-legend-dot" style="background:#B39DDB;"></span>
              <span class="ad-legend-label" data-i18n="assetdetails.joint">Joint</span>
              <span class="ad-legend-value" id="adLegendJoint">0.0%</span>
            </div>
          </div>
        </div>
      </div>

      <div style="border-top:1px solid var(--border);margin:32px 16px 0;"></div>

      <!-- Asset Trends -->
      <div style="padding:16px 16px 0;">
        <div style="height:1em;"></div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
          <div style="font-size:.85rem;font-weight:700;color:var(--fg-1);" data-i18n="assetdetails.assetTrends">Asset Trends</div>
          <div class="ad-seg" id="adSeg">
            <button class="on" onclick="switchAdPeriod('ytd',this)">YTD</button>
            <button onclick="switchAdPeriod('1m',this)">1M</button>
            <button onclick="switchAdPeriod('3m',this)">3M</button>
            <button onclick="switchAdPeriod('1y',this)">1Y</button>
            <button onclick="switchAdPeriod('all',this)">ALL</button>
          </div>
        </div>
        <!-- Reserved-height hover readout, directly under the title row so
             hovering the chart never shifts anything below it — defaults
             to the latest point, updates live on hover/touch. -->
        <div class="ad-trend-hover" id="adTrendHoverInfo">
          <div class="ad-trend-hover-date" id="adTrendHoverDate"></div>
          <div id="adTrendHoverRows"></div>
        </div>
        <canvas id="adTrendChart" style="width:100%;height:150px;display:block;touch-action:none;"></canvas>
        <div class="ad-trend-lbls">
          <span id="adTrendL0"></span>
          <span id="adTrendL1"></span>
          <span id="adTrendL2"></span>
        </div>
        <div class="ad-trend-legend">
          <div class="ad-trend-legend-item"><span class="ad-trend-legend-sw" style="border-top:2px solid #1565C0;"></span><span data-i18n="assetdetails.assetValue">Asset Value</span></div>
          <div class="ad-trend-legend-item"><span class="ad-trend-legend-sw" style="border-top:2px dashed #78716C;"></span><span data-i18n="assetdetails.accumulatedDeposit">Accumulated Deposit</span></div>
        </div>
        <div style="height:16px;"></div>
      </div>

    </div>  </div>
</div>
<script>
// Standalone fallback: this page only self-renders when opened directly (not embedded).
// When embedded, index.html's page loader strips this <script> tag entirely, and
// the shared logic in index.html's main script take over.
if(typeof switchTab==='undefined'){
function drawAdDonut(){
  var c=document.getElementById('adDonut');
  var dpr=window.devicePixelRatio||1;
  var W=c.parentElement.parentElement.clientWidth-32;
  var size=Math.min(W,260);
  var H=size*0.58;
  c.width=size*dpr;c.height=H*dpr;
  c.style.width=size+'px';c.style.height=H+'px';
  var ctx=c.getContext('2d');ctx.scale(dpr,dpr);
  var cx=size/2,cy=H*0.96,r=size*0.42,lw=r*0.11;
  var segs=[{v:65.9,c:'#64B5F6'},{v:34.1,c:'#B39DDB'}];
  var start=Math.PI;
  ctx.lineCap='butt';
  segs.forEach(function(s){
    var ang=(s.v/100)*Math.PI;
    ctx.beginPath();
    ctx.arc(cx,cy,r,start,start+ang);
    ctx.lineWidth=lw;ctx.strokeStyle=s.c;ctx.stroke();
    start+=ang;
  });
  var txt=document.getElementById('adDonutText');
  if(txt){txt.style.top=(cy-6)+'px';txt.style.transform='translateY(-100%)';}
  // Demo data above always includes a joint share — reveal the legend item
  // that's hidden by default (see its style= in the markup).
  var jWrap=document.getElementById('adLegendJointWrap');
  if(jWrap) jWrap.style.display='';
}
// v = asset value (units x NTA), d = accumulated net deposit (cumulative
// capital_injection amount — subscriptions and withdrawals, withdrawals
// signed negative) — same two series the embedded page plots from real
// capital_injection/nta_daily rows.
var AD_TREND={
  ytd:{v:[76200,78100,79850,81200,83400,85100,86300,88000],d:[75000,75000,75000,80000,80000,80000,80000,80000],l:['Jan','Mar','May','Jul']},
  '1m':{v:[85200,85900,86400,85800,86900,87500,87200,88000],d:[80000,80000,80000,80000,80000,80000,80000,80000],l:['Wk1','Wk2','Wk3','Wk4']},
  '3m':{v:[80800,82100,83400,84900,86000,87100,87600,88000],d:[80000,80000,80000,80000,80000,80000,80000,80000],l:['May','Jun','Jul']},
  '1y':{v:[68200,71400,73900,76200,79850,83400,86300,88000],d:[65000,65000,70000,75000,75000,80000,80000,80000],l:["Jul '25",'Jan',"Jul '26"]},
  all:{v:[42000,51200,58900,66700,73900,79850,84900,88000],d:[40000,40000,50000,50000,60000,70000,75000,80000],l:['2022','2024','2026']}
};
var adPeriod='ytd';
var adTrendState={};
// Rounds an axis value to a "nice" figure (nearest 10/100/1000/10000/... based
// on its own magnitude) and formats it compactly (K/M), instead of the raw
// value with two decimal places (e.g. 12123.32 -> "12K").
function niceAxisValue(v){
  var av=Math.abs(v);
  var step=av>=1000000?100000:av>=100000?10000:av>=10000?1000:av>=1000?100:av>=100?10:1;
  return Math.round(v/step)*step;
}
function fmtAxisLabel(v){
  var r=niceAxisValue(v);
  if(Math.abs(r)>=1000000) return (r/1000000).toFixed(r%1000000?1:0)+'M';
  if(Math.abs(r)>=1000) return (r/1000).toFixed(r%1000?1:0)+'K';
  return String(r);
}
function fmtRMDemo(v){ return (v||0).toLocaleString('en-MY',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function adHoverRowDemo(label,val,cls){ return '<div class="ad-trend-hover-row"><span class="lbl">'+label+'</span><span class="val'+(cls?' '+cls:'')+'">'+val+'</span></div>'; }
function drawAdTrend(period){
  var canvas=document.getElementById('adTrendChart');
  var data=AD_TREND[period];
  var n=data.v.length;
  var dpr=window.devicePixelRatio||1;
  var W=canvas.clientWidth||canvas.getBoundingClientRect().width,H=150;
  canvas.width=W*dpr;canvas.height=H*dpr;
  canvas.style.width=W+'px';canvas.style.height=H+'px';
  canvas.getContext('2d').scale(dpr,dpr);
  var allVals=data.v.concat(data.d);
  var mn=Math.min.apply(null,allVals),mx=Math.max.apply(null,allVals),rng=(mx-mn)||1;
  var padX=6,padY=10;
  adTrendState={data:data,n:n,W:W,H:H,mn:mn,mx:mx,rng:rng,padX:padX,padY:padY};
  var lbls=data.l;
  document.getElementById('adTrendL0').textContent=lbls[0]||'';
  document.getElementById('adTrendL1').textContent=lbls[Math.floor(lbls.length/2)]||'';
  document.getElementById('adTrendL2').textContent=lbls[lbls.length-1]||'';
  attachAdTrendListeners();
  drawAdTrendFrame(null);
}
function drawAdTrendFrame(hoverIdx){
  var s=adTrendState;
  if(!s.data) return;
  var canvas=document.getElementById('adTrendChart');
  var ctx=canvas.getContext('2d');
  var W=s.W,H=s.H,padX=s.padX,padY=s.padY,mn=s.mn,mx=s.mx,rng=s.rng,n=s.n;
  var vals=s.data.v,deps=s.data.d;
  ctx.clearRect(0,0,W,H);
  function px(i){return padX+(i/(n-1))*(W-padX*2);}
  function py(v){return H-padY-((v-mn)/rng)*(H-padY*2);}
  var grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'rgba(21,101,192,.18)');
  grad.addColorStop(1,'rgba(21,101,192,0)');
  ctx.beginPath();
  ctx.moveTo(px(0),py(vals[0]));
  for(var i=1;i<n;i++) ctx.lineTo(px(i),py(vals[i]));
  ctx.lineTo(px(n-1),H-padY);ctx.lineTo(px(0),H-padY);ctx.closePath();
  ctx.fillStyle=grad;ctx.fill();
  ctx.beginPath();ctx.strokeStyle='#1565C0';ctx.lineWidth=2;ctx.lineJoin='round';ctx.lineCap='round';
  ctx.moveTo(px(0),py(vals[0]));
  for(var i=1;i<n;i++) ctx.lineTo(px(i),py(vals[i]));
  ctx.stroke();
  ctx.beginPath();ctx.strokeStyle='#78716C';ctx.lineWidth=2;ctx.setLineDash([5,3]);ctx.lineJoin='round';ctx.lineCap='round';
  ctx.moveTo(px(0),py(deps[0]));
  for(var i=1;i<n;i++) ctx.lineTo(px(i),py(deps[i]));
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.beginPath();ctx.arc(px(n-1),py(vals[n-1]),3.5,0,Math.PI*2);
  ctx.fillStyle='#fff';ctx.fill();ctx.strokeStyle='#1565C0';ctx.lineWidth=2;ctx.stroke();
  ctx.beginPath();ctx.arc(px(n-1),py(deps[n-1]),3.5,0,Math.PI*2);
  ctx.fillStyle='#fff';ctx.fill();ctx.strokeStyle='#78716C';ctx.lineWidth=2;ctx.stroke();
  ctx.font='700 10px DM Sans,sans-serif';ctx.textAlign='left';
  [mx,(mn+mx)/2,mn].forEach(function(v,gi){
    var yy=padY+gi*((H-padY*2)/2);
    var txt=fmtAxisLabel(v);
    var tw=ctx.measureText(txt).width;
    ctx.fillStyle='rgba(255,255,255,.9)';ctx.fillRect(padX-2,yy-9,tw+8,14);
    ctx.fillStyle='#334155';ctx.fillText(txt,padX+2,yy+2);
  });
  var idx=hoverIdx!=null?hoverIdx:n-1;
  if(hoverIdx!=null){
    ctx.save();ctx.setLineDash([3,3]);ctx.strokeStyle='rgba(100,116,139,.6)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(px(idx),padY);ctx.lineTo(px(idx),H-padY);ctx.stroke();
    ctx.restore();
    ctx.beginPath();ctx.arc(px(idx),py(vals[idx]),4,0,Math.PI*2);ctx.fillStyle='#1565C0';ctx.fill();
    ctx.beginPath();ctx.arc(px(idx),py(deps[idx]),4,0,Math.PI*2);ctx.fillStyle='#78716C';ctx.fill();
  }
  var hDate=document.getElementById('adTrendHoverDate'),hRows=document.getElementById('adTrendHoverRows');
  if(hDate&&hRows){
    hDate.textContent=s.data.l[idx]||'';
    var pnl=vals[idx]-deps[idx];
    var pnlCls=pnl>=0?'pnl-pos':'pnl-neg';
    var pnlStr=(pnl>=0?'+':'-')+'RM '+fmtRMDemo(Math.abs(pnl));
    hRows.innerHTML=adHoverRowDemo('Asset Value','RM '+fmtRMDemo(vals[idx]))+adHoverRowDemo('Accumulated Deposit','RM '+fmtRMDemo(deps[idx]))+adHoverRowDemo('P/L',pnlStr,pnlCls);
  }
}
function attachAdTrendListeners(){
  var canvas=document.getElementById('adTrendChart');
  if(!canvas||canvas._al) return;
  canvas._al=true;
  canvas.style.touchAction='none';
  canvas.addEventListener('mousemove',adTrendHover);
  canvas.addEventListener('touchstart',function(e){e.preventDefault();adTrendHover(e);},{passive:false});
  canvas.addEventListener('touchmove',function(e){e.preventDefault();adTrendHover(e);},{passive:false});
  canvas.addEventListener('mouseleave',adTrendLeave);
  canvas.addEventListener('touchend',adTrendLeave);
  canvas.addEventListener('touchcancel',adTrendLeave);
}
function adTrendHover(e){
  var s=adTrendState;
  if(!s.data) return;
  var canvas=document.getElementById('adTrendChart');
  var rect=canvas.getBoundingClientRect();
  var clientX=e.touches&&e.touches.length?e.touches[0].clientX:e.clientX;
  var xRel=clientX-rect.left;
  var idx=Math.round((xRel-s.padX)/(s.W-s.padX*2)*(s.n-1));
  idx=Math.max(0,Math.min(s.n-1,idx));
  drawAdTrendFrame(idx);
}
function adTrendLeave(){ drawAdTrendFrame(null); }
window.switchAdPeriod=function(p,btn){
  adPeriod=p;
  document.querySelectorAll('#adSeg button').forEach(function(b){b.classList.remove('on');});
  btn.classList.add('on');
  drawAdTrend(p);
};
drawAdDonut();drawAdTrend('ytd');
window.addEventListener('resize',function(){drawAdDonut();drawAdTrend(adPeriod);});
}
</script>
</body>
</html>
