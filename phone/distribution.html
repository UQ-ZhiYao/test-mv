<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>ZY-Invest · Distribution</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --blue:#1565C0;--blue-light:#1E88E5;--blue-dark:#0D47A1;--blue-bg:#EFF6FF;
  --green:#2E7D32;--green-bg:#F0FDF4;
  --red:#DC2626;--red-bg:#FEF2F2;
  --orange:#B45309;--orange-bg:#FFF7ED;
  --fg-1:#0F172A;--fg-2:#374151;--fg-3:#64748B;
  --border:#E2E8F0;--gray-50:#F8FAFC;--gray-100:#F1F5F9;
  --font-body:'DM Sans',sans-serif;--font-display:'DM Serif Display',serif;
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;overflow:hidden;font-family:var(--font-body);background:var(--gray-50);color:var(--fg-1);}

.app{display:flex;flex-direction:column;height:100%;max-width:430px;margin:0 auto;background:#fff;position:relative;}
.standalone-shell{display:flex;flex-direction:column;height:100%;max-width:430px;margin:0 auto;background:#fff;box-shadow:0 0 40px rgba(0,0,0,.12);}
.standalone-shell .back-bar{display:none;}
.page{display:block !important;padding:0 0 16px;}

.scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;scrollbar-width:none;}
.scroll::-webkit-scrollbar{display:none;}

.back-bar{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 4px;}
.back-btn{background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:6px;font:inherit;font-size:.88rem;font-weight:600;color:var(--blue);padding:0;}
.back-btn svg{stroke:var(--blue);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

/* Filter row */
.dx-filters{display:flex;align-items:center;gap:8px;padding:14px 16px 12px;}
.dx-seg{display:flex;gap:2px;background:var(--gray-100);border-radius:10px;padding:3px;flex:1;}
.dx-seg button{flex:1;font:inherit;font-size:.78rem;font-weight:600;padding:5px 6px;border:none;background:none;border-radius:8px;color:var(--fg-3);cursor:pointer;transition:.15s;white-space:nowrap;}
.dx-seg button.on{background:#fff;color:var(--blue);box-shadow:0 1px 4px rgba(0,0,0,.1);}
.dx-acct-select{flex-shrink:0;font:inherit;font-size:.8rem;font-weight:700;color:var(--fg-1);background:var(--gray-100);border:none;border-radius:10px;padding:6px 26px 6px 12px;-webkit-appearance:none;appearance:none;cursor:pointer;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2364748B' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'/></svg>");background-repeat:no-repeat;background-position:right 8px center;background-size:14px;}

/* List */
.dx-list{margin:0 16px;}
.dx-row{display:flex;align-items:flex-start;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--border);}
.dx-row:last-child{border-bottom:none;}
.dxr-left{display:flex;flex-direction:column;gap:3px;}
.dxr-date{font-size:.88rem;font-weight:600;color:var(--fg-1);}
.dxr-type{font-size:.74rem;color:var(--fg-3);}
.dxr-right{display:flex;flex-direction:column;gap:3px;text-align:right;}
.dxr-amt{font-size:.9rem;font-weight:700;color:var(--green);}
.dx-units{font-size:.74rem;color:var(--fg-3);}

.dx-empty{padding:60px 24px;text-align:center;color:var(--fg-3);font-size:.86rem;}
</style>
</head>
<body>
<div class="standalone-shell">

  <!-- Topbar (standalone only) -->
  <div style="height:52px;background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 8px;flex-shrink:0;">
    <button onclick="history.back()" style="width:40px;height:40px;display:flex;align-items:center;justify-content:center;background:none;border:none;cursor:pointer;color:var(--fg-2);">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <span style="font-size:.92rem;font-weight:700;color:var(--fg-1);" data-i18n="distribution.pageTitle">Distribution</span>
    <div style="width:40px;"></div>
  </div>

  <div class="scroll">
<div class="page" id="pg-distribution">

      <!-- Back bar (embedded use only) -->
      <div class="back-bar">
        <button class="back-btn" onclick="typeof switchTab!=='undefined'?switchTab('all'):history.back()">
          <svg width="18" height="18" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
          <span data-i18n="market.back">Back</span>
        </button>
        <span style="font-size:.92rem;font-weight:700;color:var(--fg-1);" data-i18n="distribution.pageTitle">Distribution</span>
        <div style="width:60px;"></div>
      </div>

      <!-- Filters -->
      <div class="dx-filters">
        <div class="dx-seg">
          <button id="dxf-all" class="on" onclick="setDxFilter('all')" data-i18n="transaction.filterAll">All</button>
          <button id="dxf-cash" onclick="setDxFilter('cash')" data-i18n="distribution.filterCash">Cash</button>
          <button id="dxf-reinvest" onclick="setDxFilter('reinvest')" data-i18n="distribution.filterReinvested">Reinvested</button>
        </div>
        <select id="dxAcctSelect" class="dx-acct-select" onchange="renderDxList()">
          <option value="all" data-i18n="transaction.filterAll">All</option>
          <option value="pa" data-i18n="transaction.acctPersonal">Personal</option>
          <option value="ja" data-i18n="transaction.acctJoint">Joint</option>
        </select>
      </div>

      <!-- List -->
      <div class="dx-list" id="dxList"></div>

    </div>  </div>
</div>
<script>
// Standalone fallback: this page only self-renders when opened directly (not embedded).
// When embedded, index.html's page loader strips this <script> tag entirely, and
// the shared DX_DATA/renderDxList/setDxFilter in index.html's main script take over.
if(typeof switchTab==='undefined'){
var DX_DATA=[
  {date:'30 Jun 2026',type:'Cash Payout',acct:'pa',kind:'cash',amt:842.50,units:0},
  {date:'30 Jun 2026',type:'Unit Reinvestment',acct:'ja',kind:'reinvest',amt:410.00,units:400.20},
  {date:'31 Mar 2026',type:'Cash Payout',acct:'ja',kind:'cash',amt:388.00,units:0},
  {date:'31 Mar 2026',type:'Unit Reinvestment',acct:'pa',kind:'reinvest',amt:761.20,units:743.06},
  {date:'31 Dec 2025',type:'Cash Payout',acct:'pa',kind:'cash',amt:695.40,units:0},
  {date:'30 Sep 2025',type:'Unit Reinvestment',acct:'ja',kind:'reinvest',amt:352.80,units:344.60}
];
var dxFilter='all';
window.setDxFilter=function(f){
  dxFilter=f;
  ['all','cash','reinvest'].forEach(function(k){document.getElementById('dxf-'+k).classList.toggle('on',k===f);});
  renderDxList();
};
function fmtDxRM(n){return n.toLocaleString('en-MY',{minimumFractionDigits:2,maximumFractionDigits:2});}
window.renderDxList=function(){
  var acct=document.getElementById('dxAcctSelect').value;
  var rows=DX_DATA.filter(function(t){
    return (dxFilter==='all'||t.kind===dxFilter)&&(acct==='all'||t.acct===acct);
  });
  var list=document.getElementById('dxList');
  var ttDx=(typeof t==='function')?t:function(k){return k;};
  if(!rows.length){list.innerHTML='<div class="dx-empty">'+ttDx('distribution.noDistributionsFound')+'</div>';return;}
  list.innerHTML=rows.map(function(t){
    return '<div class="dx-row">'
      +'<div class="dxr-left"><div class="dxr-date">'+t.date+'</div><div class="dxr-type">'+(t.kind==='cash'?ttDx('distribution.cashPayout'):t.kind==='reinvest'?ttDx('distribution.unitReinvestment'):t.type)+'</div></div>'
      +'<div class="dxr-right"><div class="dxr-amt">+RM '+fmtDxRM(t.amt)+'</div><div class="dx-units">'+(t.units>0?fmtDxRM(t.units)+ttDx('sheet.unitsSuffix'):'—')+'</div></div>'
      +'</div>';
  }).join('');
};
renderDxList();
}
</script>
</body>
</html>
