<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>ZY-Invest · Account Details</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/phone-shared.css?v=1">
</head>
<body>
<div class="standalone-shell">
  <div class="scroll" style="flex:1;overflow-y:auto;overflow-x:hidden;scrollbar-width:none;">
<div class="page" id="pg-accountdetails">

      <!-- Back bar (standalone fallback only — embedded use gets its back
           button + dynamic title ("Personal Account"/"Joint Account") from
           the shared topbar; see openAccountDetails() in
           profile-account.js, same pattern as instrument.html's dynamic
           title). -->
      <div class="back-bar">
        <button class="back-btn" onclick="typeof switchTab!=='undefined'?switchTab('portfolio'):history.back()">
          <svg width="18" height="18" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
          Back
        </button>
        <span style="font-size:.92rem;font-weight:700;color:var(--fg-1);">ZY-Invest</span>
        <div style="width:60px;"></div>
      </div>

      <!-- Tabs — same show/hide-body pattern as fund.html's switchFundTab2().
           #adtab-profile-btn is hidden unless the joint account is being
           viewed (see renderAccountDetails() in profile-account.js). -->
      <div style="display:flex;gap:0;padding:0 16px;border-bottom:1px solid var(--border);position:sticky;top:0;background:#fff;z-index:10;overflow-x:auto;scrollbar-width:none;">
        <button id="adtab-assets-btn" onclick="switchAcctDetailTab('assets')" style="font:inherit;font-size:.82rem;font-weight:600;color:var(--blue);background:none;border:none;border-bottom:2px solid var(--blue);padding:12px 12px 10px;cursor:pointer;white-space:nowrap;flex-shrink:0;">Assets</button>
        <button id="adtab-principal-btn" onclick="switchAcctDetailTab('principal')" style="font:inherit;font-size:.82rem;font-weight:600;color:var(--fg-3);background:none;border:none;border-bottom:2px solid transparent;padding:12px 12px 10px;cursor:pointer;white-space:nowrap;flex-shrink:0;">Principal</button>
        <button id="adtab-distribution-btn" onclick="switchAcctDetailTab('distribution')" style="font:inherit;font-size:.82rem;font-weight:600;color:var(--fg-3);background:none;border:none;border-bottom:2px solid transparent;padding:12px 12px 10px;cursor:pointer;white-space:nowrap;flex-shrink:0;">Distribution</button>
        <button id="adtab-profile-btn" onclick="switchAcctDetailTab('profile')" style="display:none;font:inherit;font-size:.82rem;font-weight:600;color:var(--fg-3);background:none;border:none;border-bottom:2px solid transparent;padding:12px 12px 10px;cursor:pointer;white-space:nowrap;flex-shrink:0;">Profile</button>
      </div>

      <!-- ── ASSETS TAB ── -->
      <div id="adtab-assets-body" style="padding:16px 16px 32px;">
        <div class="info-list">
          <div class="info-row"><span class="info-label">Asset Value</span><span class="info-value" id="adAssetValue">0.00</span></div>
          <div class="info-row"><span class="info-label">Unrealized Return</span><span class="info-value" id="adUnrealized">0.00</span></div>
          <div class="info-row"><span class="info-label">Realized Return</span><span class="info-value" id="adRealized">0.00</span></div>
          <div class="info-row"><span class="info-label">Total Return</span><span class="info-value" id="adTotalReturn">0.00</span></div>
          <div class="info-row"><span class="info-label">Return %</span><span class="info-value" id="adReturnPct">0.00%</span></div>
          <div class="info-row"><span class="info-label">Period</span><span class="info-value" id="adPeriodDays">0 days</span></div>
          <div class="info-row"><span class="info-label">IRR</span><span class="info-value" id="adIrr">—</span></div>
        </div>
      </div>

      <!-- ── PRINCIPAL TAB — same data/markup as the Transaction page
           (buildTxDataFromCi()/TX_DATA, .tx-row), fixed to this one
           account so there's no account selector, just the type filter. ── -->
      <div id="adtab-principal-body" style="display:none;">
        <div class="tx-filters" style="padding:14px 16px 12px;">
          <div class="tx-seg">
            <button id="adtxf-all" class="on" onclick="setAdTxFilter('all')">All</button>
            <button id="adtxf-deposit" onclick="setAdTxFilter('deposit')">Deposit</button>
            <button id="adtxf-withdrawal" onclick="setAdTxFilter('withdrawal')">Withdrawal</button>
          </div>
        </div>
        <div class="tx-list" id="adTxList"></div>
      </div>

      <!-- ── DISTRIBUTION TAB — same data/markup as the Distribution page
           (loadDistributionHistory()/DX_DATA, .dx-row), fixed account. ── -->
      <div id="adtab-distribution-body" style="display:none;">
        <div class="tx-filters" style="padding:14px 16px 12px;">
          <div class="dx-seg">
            <button id="addxf-all" class="on" onclick="setAdDxFilter('all')">All</button>
            <button id="addxf-cash" onclick="setAdDxFilter('cash')">Cash</button>
            <button id="addxf-reinvest" onclick="setAdDxFilter('reinvest')">Reinvested</button>
          </div>
        </div>
        <div class="dx-list" id="adDxList"></div>
      </div>

      <!-- ── PROFILE TAB (joint account only) — gated behind the centered
           PIN popup below until unlocked for this session. ── -->
      <div id="adtab-profile-body" style="display:none;padding:16px 16px 32px;">
        <div id="adProfileLocked" style="text-align:center;padding:40px 20px;">
          <div style="font-size:.85rem;color:var(--fg-3);margin-bottom:14px;">Enter your PIN to view co-holder details.</div>
          <button onclick="openAdPin()" style="padding:12px 20px;border-radius:12px;border:none;background:var(--blue);color:#fff;font:inherit;font-size:.88rem;font-weight:700;cursor:pointer;">Unlock</button>
        </div>
        <div id="adCoHolderList" style="display:none;"></div>
      </div>

      <!-- Centered PIN gate — must live inside the .page div (not after
           it) so it survives loadPages()'s extraction, which only keeps
           the .page element's own outerHTML when embedding this fragment
           into the SPA shell. position:fixed still anchors to the real
           viewport regardless of this nesting depth. -->
      <div id="adPinScrim" onclick="closeAdPin()" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;"></div>
      <div id="adPinModal" style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:calc(100% - 48px);max-width:340px;background:#fff;border-radius:16px;padding:24px;z-index:101;box-shadow:0 8px 40px rgba(0,0,0,.18);">
        <div style="font-size:1.05rem;font-weight:700;color:var(--fg-1);margin-bottom:6px;">Enter PIN</div>
        <div style="font-size:.82rem;color:var(--fg-3);margin-bottom:18px;line-height:1.5;">Enter your 6-digit PIN to view co-holder details.</div>
        <input id="adPinInput" type="password" inputmode="numeric" maxlength="6" pattern="[0-9]*" placeholder="——————" autocomplete="off" onkeydown="if(event.key==='Enter')submitAdPin()" style="width:100%;font-size:1.6rem;letter-spacing:.6em;text-align:center;padding:14px 10px 14px 20px;border:1.5px solid var(--border);border-radius:12px;outline:none;font-family:inherit;box-sizing:border-box;">
        <div id="adPinErr" style="display:none;color:var(--red);font-size:.78rem;margin-top:8px;text-align:center;"></div>
        <button onclick="submitAdPin()" style="width:100%;margin-top:18px;padding:14px;border-radius:12px;border:none;background:var(--blue);color:#fff;font:inherit;font-size:.95rem;font-weight:700;cursor:pointer;">Confirm</button>
        <button onclick="closeAdPin()" style="width:100%;margin-top:8px;padding:12px;border-radius:12px;border:none;background:none;color:var(--fg-3);font:inherit;font-size:.88rem;font-weight:600;cursor:pointer;">Cancel</button>
      </div>

    </div>  </div>
</div>
</body>
</html>
